name: Selenium Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
     test:
       runs-on: ubuntu-latest
  
       steps:
         - name: Check out repository
           uses: actions/checkout@v4
  
         - name: Install uv
           uses: astral-sh/setup-uv@v3
           with:
             version: "latest"
             enable-cache: true
  
         - name: Set up Python
           uses: actions/setup-python@v5
           with:
             python-version: "3.13"
  
         - name: Install dependencies
           run: uv sync --all-extras --dev
  
         - name: Create images directory
           run: mkdir -p images
  
         - name: Run Selenium Tests
           env:
             CI: "true"
           run: uv run pytest selenium-test/test_selenium.py
  
         - name: Upload screenshots on failure or success
           uses: actions/upload-artifact@v4
           if: always()
           with:
             name: selenium-screenshots
             path: images/*.png
             retention-days: 7
